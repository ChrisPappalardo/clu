user:
  timezone: America/Los_Angeles
  home_location:
    label: San Francisco, CA
    latitude: 37.8025
    longitude: -122.4058
  delivery:
    store_html_report: true
    store_json_report: true
    generate_email_friendly_html: true

briefing:
  max_headlines_per_section: 6
  max_sections: 6
  include_sections:
    - world-news
    - macro
    - markets
    - weather
    - science
    - disruptions
  priorities:
    geography:
      - global
      - united-states
      - europe
      - asia
    topics:
      - geopolitics
      - macroeconomics
      - energy
      - technology
      - climate
      - public-health
  tone:
    style: concise
    viewpoint: neutral
    interpretation_level: high

ai:
  provider: ollama
  fast_model: ${OLLAMA_FAST_MODEL}
  model: ${OLLAMA_MODEL}
  enabled: true
  base_url: ${OLLAMA_BASE_URL}
  api_key_env: OLLAMA_API_KEY

sources:
  - id: guardian-world
    type: guardian
    enabled: true
    section: world-news
    display_name: The Guardian World
    params:
      api_key_env: GUARDIAN_API_KEY
      section: world
      query: "(geopolitics OR diplomacy OR conflict OR election OR climate)"
      page_size: 10
      exclude_content_types:
        - liveblog
      exclude_url_patterns:
        - /commentisfree/
        - /opinion/
      exclude_title_patterns:
        - " | "
        - "^How\\s"
        - "^Why\\s"
        - "^Opinion\\b"
        - "^Analysis\\b"
        - "revealed the true cost"
        - "taught us to"

  - id: guardian-business
    type: guardian
    enabled: true
    section: markets
    display_name: The Guardian Business
    params:
      api_key_env: GUARDIAN_API_KEY
      section: business
      query: "(markets OR economy OR inflation OR rates OR oil OR trade)"
      page_size: 8
      exclude_content_types:
        - liveblog
      exclude_url_patterns:
        - /commentisfree/
        - /opinion/
      exclude_title_patterns:
        - " | "
        - "^How\\s"
        - "^Why\\s"
        - "^Opinion\\b"
        - "^Analysis\\b"

  - id: gdelt-world
    type: gdelt
    enabled: false
    section: world-news
    display_name: GDELT Global Coverage
    params:
      query: "(geopolitics OR macroeconomy OR climate OR energy)"
      max_records: 10
      timespan: 1d

  - id: npr-rss
    type: rss
    enabled: true
    section: world-news
    display_name: NPR World
    params:
      feed_url: https://feeds.npr.org/1004/rss.xml
      max_items: 10
      exclude_title_patterns:
        - ".*\\sAnd,\\s.*"
        - "^How\\s"
        - "^Why\\s"
        - "^Greetings\\s"

  - id: bbc-world-rss
    type: rss
    enabled: true
    section: world-news
    display_name: BBC World
    params:
      feed_url: http://feeds.bbci.co.uk/news/world/rss.xml
      max_items: 8
      exclude_title_patterns:
        - "^How\\s"
        - "^Why\\s"
        - "^The world explained"

  - id: bbc-business-rss
    type: rss
    enabled: true
    section: markets
    display_name: BBC Business
    params:
      feed_url: http://feeds.bbci.co.uk/news/business/rss.xml
      max_items: 6
      exclude_title_patterns:
        - "^How\\s"
        - "^Why\\s"
        - "^Analysis\\b"

  - id: dw-world-rss
    type: rss
    enabled: true
    section: world-news
    display_name: DW World
    params:
      feed_url: https://rss.dw.com/rdf/rss-en-world
      max_items: 8
      exclude_title_patterns:
        - "^How\\s"
        - "^Why\\s"

  - id: pbs-world-rss
    type: rss
    enabled: true
    section: world-news
    display_name: PBS NewsHour World
    params:
      feed_url: https://www.pbs.org/newshour/feeds/rss/headlines
      max_items: 6
      include_url_patterns:
        - /world/
      exclude_title_patterns:
        - "^How\\s"
        - "^Why\\s"
        - "^Listen\\s"
        - "World Cup"
        - "tourist sites"
        - "pyramids"

  - id: fred-macro
    type: fred
    enabled: true
    section: macro
    display_name: FRED Macro
    params:
      api_key_env: FRED_API_KEY
      series:
        - id: CPIAUCSL
          label: CPI
          section: macro
        - id: CPILFESL
          label: Core CPI
          section: macro
        - id: UNRATE
          label: Unemployment Rate
          unit: "%"
          section: macro
        - id: PAYEMS
          label: Nonfarm Payrolls
          section: macro
        - id: RSAFS
          label: Retail Sales
          section: macro
        - id: INDPRO
          label: Industrial Production
          section: macro
        - id: HOUST
          label: Housing Starts
          section: macro
        - id: FEDFUNDS
          label: Fed Funds Rate
          unit: "%"
          section: macro
        - id: DGS10
          label: US 10Y Treasury
          unit: "%"
          section: markets
        - id: DGS2
          label: US 2Y Treasury
          unit: "%"
          section: markets
        - id: DCOILBRENTEU
          label: Brent Crude Spot
          unit: USD/bbl
          section: markets
        - id: DTWEXBGS
          label: Broad Dollar Index
          section: markets
        - id: VIXCLS
          label: VIX
          section: markets
        - id: BAMLH0A0HYM2
          label: High Yield Spread
          unit: "%"
          section: markets
        - id: SP500
          label: S&P 500
          section: markets
        - id: NASDAQCOM
          label: Nasdaq Composite
          section: markets

  - id: world-bank
    type: world_bank
    enabled: true
    section: macro
    display_name: World Bank Indicators
    params:
      indicators:
        - code: NY.GDP.MKTP.CD
          countries: us;cn;eu
        - code: SP.POP.TOTL
          countries: us;in;cn

  - id: alpha-vantage
    type: alpha_vantage
    enabled: false
    section: markets
    display_name: Alpha Vantage Markets
    params:
      api_key_env: ALPHAVANTAGE_API_KEY
      functions:
        - function: TOP_GAINERS_LOSERS

  - id: open-meteo-home
    type: open_meteo
    enabled: true
    section: weather
    display_name: Open-Meteo Home Forecast
    params:
      daily:
        - temperature_2m_max
        - temperature_2m_min
        - precipitation_sum
        - weather_code

  - id: usgs-quakes
    type: usgs
    enabled: true
    section: disruptions
    display_name: USGS Significant Earthquakes
    params:
      feed: significant_day
